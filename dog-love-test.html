<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e0e;font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-12px)}}
@keyframes popIn{0%{transform:scale(0.94);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes wiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
.screen{max-width:460px;width:100%;animation:fadeUp 0.5s ease}
.screen.quiz{max-width:480px}
.screen.out{animation:fadeOut 0.3s ease forwards}
.label{font-size:11px;letter-spacing:4px;color:#666;text-transform:uppercase;margin-bottom:10px;font-weight:700}
.card-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px 18px;margin-bottom:24px;text-align:left}
.card-row{font-size:13px;color:#bbb;padding:3px 0;display:flex;gap:10px}
.card-row span{color:#444}
.btn-primary{background:#fff;color:#0e0e0e;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:900;cursor:pointer;width:100%;letter-spacing:1px;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s ease}
.btn-primary:hover{opacity:0.85;transform:translateY(-1px)}
.btn-primary.disabled{background:rgba(255,255,255,0.1);color:#444;cursor:default}
.btn-primary.disabled:hover{opacity:1;transform:none}
.btn-restart{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:14px;color:#bbb;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s ease}
.btn-restart:hover{opacity:0.85;transform:translateY(-1px)}
.input-label{font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase;font-weight:700;display:block;margin-bottom:8px}
input[type=text]{width:100%;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 16px;color:#fff;font-size:14px;font-family:'Noto Sans KR',sans-serif;transition:border 0.2s;outline:none}
input[type=text]:focus{border-color:rgba(255,255,255,0.45)}
input[type=text]::placeholder{color:#444}
.progress-wrap{margin-bottom:20px}
.progress-top{display:flex;justify-content:space-between;font-size:11px;color:#444;margin-bottom:8px;font-weight:700;letter-spacing:1px}
.progress-top .left{color:#666}
.progress-bar{height:3px;background:rgba(255,255,255,0.07);border-radius:99px}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#fff 0%,#888 100%);transition:width 0.5s ease}
.section-divider{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.section-divider .line{flex:1;height:1px;background:rgba(255,255,255,0.07)}
.section-divider .text{font-size:11px;color:#555;font-weight:700;letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
.q-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;margin-bottom:16px}
.q-text{font-size:16px;color:#f0f0f0;line-height:1.75;font-weight:400}
.opt-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.opt-btn{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px 18px;color:#e0e0e0;font-size:14px;cursor:pointer;text-align:left;line-height:1.65;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;gap:14px;transition:all 0.2s ease;width:100%}
.opt-btn:hover{border-color:rgba(255,255,255,0.4);transform:translateY(-2px);background:rgba(255,255,255,0.09)}
.opt-btn.active{background:rgba(255,255,255,0.11);border-color:rgba(255,255,255,0.5)}
.opt-btn.dim{opacity:0.38;color:rgba(255,255,255,0.22)}
.opt-badge{min-width:26px;height:26px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#555}
.opt-btn.active .opt-badge{background:#fff;color:#0e0e0e}
.next-wrap{animation:popIn 0.22s ease}
/* result */
.result-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:32px 24px;margin-bottom:12px;text-align:center}
.result-label{font-size:11px;letter-spacing:3px;color:#555;text-transform:uppercase;margin-bottom:12px;font-weight:700}
.result-who{font-size:15px;color:#777;margin-bottom:6px}
.result-who strong{color:#fff;font-weight:900}
.result-mbti{font-size:42px;font-weight:900;letter-spacing:5px;margin-bottom:8px}
.result-dog-name{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px}
.result-title{font-size:13px;color:#666;margin-bottom:20px}
.result-desc{font-size:13px;color:#999;line-height:1.85;background:rgba(255,255,255,0.04);border-radius:12px;padding:14px 16px;text-align:left;margin-bottom:24px}
.compat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.compat-box{border-radius:12px;padding:14px 12px;text-align:left}
.compat-good{background:rgba(74,222,128,0.05);border:1px solid rgba(74,222,128,0.18)}
.compat-bad{background:rgba(248,113,113,0.05);border:1px solid rgba(248,113,113,0.18)}
.compat-label{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.compat-good .compat-label{color:#4ade80}
.compat-bad .compat-label{color:#f87171}
.compat-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700}
.badge-good{background:rgba(74,222,128,0.12);color:#4ade80;border:1px solid rgba(74,222,128,0.25)}
.badge-bad{background:rgba(248,113,113,0.12);color:#f87171;border:1px solid rgba(248,113,113,0.25)}
.compat-desc{font-size:11px;color:#666;line-height:1.6}
.share-note{text-align:center;font-size:11px;color:#333}
/* SVG dog */
.dog-svg-wrap{margin:0 auto 12px;animation:wiggle 1s ease 0.6s}

  {id:1,situation:"연애할 때 연락 스타일은?",options:[{text:"수시로 카톡하고 통화도 자주 해야 해. 연락이 곧 애정이야",axes:{E:1}},{text:"하루 한두 번 안부면 충분해. 자주 안 해도 믿으니까",axes:{I:1}}]},
  {id:2,situation:"주말에 애인이랑 뭐 하고 싶어?",options:[{text:"친구들이랑 같이 어울리거나 새로운 곳에 나가고 싶어",axes:{E:1}},{text:"둘이서만 집에서 조용히 있거나 드라이브 가고 싶어",axes:{I:1}}]},
  {id:3,situation:"애인이 서운하게 했을 때 나는?",options:[{text:"바로 그 자리에서 말해. 쌓아두면 더 힘드니까",axes:{E:1}},{text:"혼자 좀 삭히다가 감정이 가라앉으면 조용히 말해",axes:{I:1}}]},
  {id:4,situation:"애인이 \"오늘 좀 피곤해 보여\"라고 하면?",options:[{text:"\"응, 어제 잠을 못 잤어\" 사실 그대로 말해",axes:{S:1}},{text:"\"혹시 나한테 하고 싶은 말 있어?\" 숨은 의미를 찾아봐",axes:{N:1}}]},
  {id:5,situation:"데이트할 때 더 끌리는 건?",options:[{text:"맛집, 핫플 등 실제로 즐길 수 있는 구체적인 계획",axes:{S:1}},{text:"테마나 분위기가 있는 색다르고 새로운 경험",axes:{N:1}}]},
  {id:6,situation:"연애 초반에 더 설레는 순간은?",options:[{text:"같이 밥 먹고, 손 잡고, 일상을 나누는 소소한 순간들",axes:{S:1}},{text:"이 사람이랑 앞으로 어떤 삶을 만들어갈지 상상하는 것",axes:{N:1}}]},
  {id:7,situation:"애인이 힘든 상황을 털어놓을 때 나는?",options:[{text:"문제를 같이 분석하고 해결 방법을 찾아줘. 그게 진짜 도움이라고 생각해",axes:{T:1}},{text:"일단 공감해주고 함께 있어줘. 위로가 먼저야",axes:{F:1}}]},

  {id:9,situation:"기념일에 애인이 준 선물이 마음에 안 들어. 어떻게 해?",options:[{text:"솔직하게 다음엔 이런 게 더 좋겠다고 말해. 알아야 다음에 잘 해주지",axes:{T:1}},{text:"선물보다 마음이 중요하니까 기쁘게 받아. 괜히 상처 주고 싶지 않아",axes:{F:1}}]},
  {id:10,situation:"데이트 계획을 짤 때 나는?",options:[{text:"미리 동선, 식당, 시간 다 짜놔야 안심돼. 즉흥은 좀 불안해",axes:{J:1}},{text:"대충 방향만 잡고 그날 기분대로 움직이는 게 더 재밌어",axes:{P:1}}]},
  {id:11,situation:"연애할 때 미래 얘기는?",options:[{text:"구체적으로 그려보는 게 좋아. 언제 결혼, 어디 살지 얘기하는 게 설레",axes:{J:1}},{text:"지금 행복하면 됐지. 너무 앞날 생각하면 오히려 부담스러워",axes:{P:1}}]},
  {id:12,situation:"갑자기 애인이 \"오늘 즉흥으로 여행 갈래?\" 하면?",options:[{text:"좋긴 한데... 준비도 없이? 최소한 뭐라도 챙겨야 해",axes:{J:1}},{text:"대박, 바로 가자! 이런 즉흥이 제일 재밌어",axes:{P:1}}]},
];
const sectionLabels={1:"연애 스타일",4:"연애 감각",7:"연애 방식",10:"연애 계획"};
const mbtiResults={
  ENFJ:{title:"따뜻한 리더형 연인",desc:"상대를 깊이 이해하고 이끌어주는 스타일이에요. 감정 표현이 풍부하고 관계에 진심이라 상대방이 항상 사랑받는 느낌을 받아요.",dog:"골든리트리버",best:["INFP","ISFP"],bestDesc:"INFP·ISFP의 감성을 자연스럽게 끌어내줘요.",worst:["ISTP","ESTP"],worstDesc:"감정 표현이 적은 유형과는 온도 차가 날 수 있어요.",color:"#f472b6"},
  ENFP:{title:"열정 폭발 자유영혼 연인",desc:"상대에게 설레는 감정을 가득 주는 스타일이에요. 즉흥적이고 애정 표현이 넘쳐서 같이 있으면 매일이 새로워요.",dog:"포메라니안",best:["INTJ","INFJ"],bestDesc:"INTJ·INFJ의 깊이 있는 세계관이 ENFP의 호기심과 최강 시너지예요.",worst:["ISTJ","ESTJ"],worstDesc:"계획적이고 현실적인 유형과는 생활 방식 차이가 클 수 있어요.",color:"#fb923c"},
  ENTJ:{title:"주도적인 비전형 연인",desc:"연애도 이끌어가는 스타일이에요. 미래 계획을 함께 그리고 실행하는 걸 좋아하며 상대를 성장시켜주고 싶어 해요.",dog:"도베르만",best:["INTP","INFP"],bestDesc:"INTP의 논리적 깊이, INFP의 가치관이 ENTJ의 추진력과 균형을 이뤄요.",worst:["ISFP","ISFJ"],worstDesc:"감성적이고 조화를 추구하는 유형과는 스타일 차이가 있어요.",color:"#e11d48"},
  ENTP:{title:"지적 자극 추구형 연인",desc:"대화가 통하는 상대를 원해요. 토론하고 아이디어 나누는 걸 즐기며 연애도 지적 교류의 연장이에요.",dog:"비글",best:["INFJ","INTJ"],bestDesc:"깊이 있는 대화 상대인 INFJ·INTJ와 만나면 감정도 지성도 채워져요.",worst:["ISFJ","ESFJ"],worstDesc:"안정과 조화를 중시하는 유형과는 자극 수준이 달라요.",color:"#7c3aed"},
  INFJ:{title:"깊은 연결을 원하는 연인",desc:"표면적 관계보다 영혼까지 통하는 깊은 연결을 원해요. 상대의 감정을 잘 읽고 진심으로 대하는 관계에서 빛나요.",dog:"시바이누",best:["ENFP","ENTP"],bestDesc:"에너지 넘치는 ENFP·ENTP와 만나면 INFJ의 세계가 활짝 열려요.",worst:["ESTP","ESFP"],worstDesc:"자극을 즐기는 외향형과는 에너지 속도가 달라 지칠 수 있어요.",color:"#6366f1"},
  INFP:{title:"로맨틱 이상주의 연인",desc:"진짜 감정, 진짜 연결을 원해요. 상대방이 나를 있는 그대로 받아들여주길 바라고 감성적인 교류에서 행복을 느껴요.",dog:"말티즈",best:["ENFJ","ENTJ"],bestDesc:"ENFJ의 따뜻함, ENTJ의 추진력이 INFP를 세상 밖으로 이끌어줘요.",worst:["ESTJ","ESTP"],worstDesc:"현실적이고 직설적인 유형과는 상처받는 일이 생길 수 있어요.",color:"#a78bfa"},
  INTJ:{title:"독립적인 전략가형 연인",desc:"감정 표현은 적지만 행동으로 보여줘요. 깊이 신뢰하는 상대에게만 마음을 열고 함께 성장하는 관계를 원해요.",dog:"차우차우",best:["ENFP","ENTP"],bestDesc:"ENFP·ENTP의 따뜻한 에너지가 INTJ의 닫힌 문을 살살 열어줘요.",worst:["ESFP","ESFJ"],worstDesc:"감정 중심의 외향적 유형과는 깊이 연결되기 어려울 수 있어요.",color:"#0ea5e9"},
  INTP:{title:"논리적 탐구형 연인",desc:"지적으로 통하는 상대를 원해요. 겉으론 쿨해 보이지만 신뢰하는 상대에게는 의외로 섬세하게 챙겨요.",dog:"바센지",best:["ENTJ","ENFJ"],bestDesc:"ENTJ의 방향성, ENFJ의 따뜻함이 INTP에게 안정감을 줘요.",worst:["ESFJ","ESTJ"],worstDesc:"감정과 형식을 중시하는 유형과는 답답함을 느낄 수 있어요.",color:"#14b8a6"},
  ISFJ:{title:"헌신적인 돌봄형 연인",desc:"상대를 세심하게 챙기고 안정적인 관계를 만들어가요. 사소한 것도 다 기억하고 챙겨주는 스타일이에요.",dog:"라브라도",best:["ESFP","ESTP"],bestDesc:"활발한 유형이 ISFJ의 일상에 활기를 불어넣어 줘요.",worst:["ENTP","ENTJ"],worstDesc:"변화와 자극을 즐기는 유형과는 안정 욕구 차이가 있어요.",color:"#84cc16"},
  ISFP:{title:"감성 충만 자유로운 연인",desc:"말보다 행동으로 애정을 표현해요. 조용하지만 깊이 있고 상대방이 편안함을 느낄 수 있는 분위기를 만들어요.",dog:"웰시코기",best:["ENFJ","ESFJ"],bestDesc:"ENFJ·ESFJ의 따뜻한 리드 덕분에 ISFP가 자연스럽게 마음을 열어요.",worst:["ENTJ","ESTJ"],worstDesc:"주도적이고 직선적인 유형과는 위축될 수 있어요.",color:"#f59e0b"},

// ── 상태 ──────────────────────────────────────────────────────────
let phase="intro",nickname="",scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0},current=0,selected=null,transitioning=false,mbtiResult=null;

function calcMbti(s){
  return (s.E>=s.I?"E":"I")+(s.S>=s.N?"S":"N")+(s.T>=s.F?"T":"F")+(s.J>=s.P?"J":"P");
}

function render(){
  const app=document.getElementById("app");
  if(phase==="intro") renderIntro(app);
  else if(phase==="quiz") renderQuiz(app);
  else if(phase==="result") renderResult(app);
}

function renderIntro(app){
  app.innerHTML=`
  <div class="screen" style="text-align:center">
    <div style="font-size:52px;margin-bottom:16px">🐾</div>
    <div class="label">Love Style × MBTI</div>
    <h1 style="font-size:24px;font-weight:900;color:#fff;line-height:1.35;margin:0 0 12px">나의 연애 성향과<br>닮은 강아지는?</h1>
    <p style="font-size:14px;color:#777;line-height:1.8;margin:0 0 24px">12가지 연애 질문으로<br>내 MBTI 연애 유형과 닮은 강아지 종을 찾아줘요.</p>
    <div class="card-box">
      <div class="card-row"><span>—</span> 총 12문항 · 2지선다</div>
      <div class="card-row"><span>—</span> 외향/내향, 현실/직관, 이성/감성, 계획/즉흥 측정</div>
      <div class="card-row"><span>—</span> 닉네임 + MBTI + 닮은 강아지 SVG 일러스트 공개</div>
    </div>
    <div style="margin-bottom:14px;text-align:left">
      <label class="input-label">이름 또는 닉네임 <span style="font-weight:400;color:#666">(선택)</span></label>
      <input type="text" id="nick-input" placeholder="예) 해리쉬, 햄진이" maxlength="10" value="${nickname}">
    </div>
    <button class="btn-primary ${nickname.trim()?'':'disabled'}" id="start-btn">시작하기 →</button>
  </div>`;
  const inp=document.getElementById("nick-input");
  const btn=document.getElementById("start-btn");
  inp.addEventListener("input",e=>{
    nickname=e.target.value;
    btn.className="btn-primary "+(nickname.trim()?"":"disabled");
  });
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"){phase="quiz";render();}});
  btn.addEventListener("click",()=>{phase="quiz";render();});
}

function renderQuiz(app){
  const q=questions[current];
  const progress=Math.round((current/questions.length)*100);
  const sLabel={1:"연애 스타일",4:"연애 감각",7:"연애 방식",10:"연애 계획"}[q.id];
  app.innerHTML=`
  <div class="screen quiz ${transitioning?'out':''}">
    <div class="progress-wrap">
      <div class="progress-top"><span class="left">Q ${current+1} / ${questions.length}</span><span>${progress}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    ${sLabel?`<div class="section-divider"><div class="line"></div><span class="text">${sLabel}</span><div class="line"></div></div>`:""}
    <div class="q-card"><p class="q-text">${q.situation}</p></div>
    <div class="opt-list">
      ${q.options.map((opt,idx)=>`
        <button class="opt-btn ${selected===idx?'active':''} ${selected!==null&&selected!==idx?'dim':''}" data-idx="${idx}">
          <span class="opt-badge">${idx===0?"A":"B"}</span>
          <span>${opt.text}</span>
        </button>`).join("")}
    </div>
    ${selected!==null?`<div class="next-wrap"><button class="btn-primary" id="next-btn">${current+1>=questions.length?"결과 보기 →":"다음 →"}</button></div>`:""}
  </div>`;
  document.querySelectorAll(".opt-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      if(transitioning)return;
      const idx=parseInt(btn.dataset.idx);
      selected=selected===idx?null:idx;
      render();
    });
  });
  const nb=document.getElementById("next-btn");
  if(nb) nb.addEventListener("click",()=>{
    if(selected===null||transitioning)return;
    transitioning=true;
    const axes=q.options[selected].axes;
    Object.entries(axes).forEach(([k,v])=>{scores[k]=(scores[k]||0)+v;});
    setTimeout(()=>{
      if(current+1>=questions.length){mbtiResult=calcMbti(scores);phase="result";}
      else{current++;selected=null;}
      transitioning=false;render();
    },350);
  });
}

async function incrementCount(){

  </div>`;
  document.getElementById("restart-btn").addEventListener("click",()=>{
    phase="intro";nickname="";scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};current=0;selected=null;transitioning=false;mbtiResult=null;
    render();
  });
}

render();
