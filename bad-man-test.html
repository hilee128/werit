const SUPABASE_URL="https://dleoheiqaardmpyoklmt.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsZW9oZWlxYWFyZG1weW9rbG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MzUzNzMsImV4cCI6MjA5NDIxMTM3M30.yVmdhisxmC1KB3Ku1ZapF_CtTqEacqw8BWt32n30-Lc";
const TEST_NAME="ddongcha-filter-test";
async function incrementCount(){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/test_counts?test_name=eq.${TEST_NAME}&select=count`,{headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}});
    const data=await res.json();
    if(data&&data.length>0){
      await fetch(`${SUPABASE_URL}/rest/v1/test_counts?test_name=eq.${TEST_NAME}`,{method:"PATCH",headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({count:(data[0].count||0)+1})});
    }else{
      await fetch(`${SUPABASE_URL}/rest/v1/test_counts`,{method:"POST",headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({test_name:TEST_NAME,count:1})});
    }
  }catch(e){console.warn("Supabase error:",e);}
}

// ── state ──
let phase="intro",current=0,totalScore=0,answers=[],transitioning=false,countedThisSession=false,nickname="";

function getResult(){
  return results.find(r=>totalScore>=r.min&&totalScore<=r.max)||results[0];
}

function render(){
  const app=document.getElementById("app");
  if(phase==="intro") renderIntro(app);
  else if(phase==="quiz") renderQuiz(app);
  else if(phase==="result") renderResult(app);
  else if(phase==="review") renderReview(app);
}

function renderQuiz(app){
  const q=scenarios[current];
  const progress=(current/scenarios.length)*100;
  const selectedIdx=answers[current]!==undefined?answers[current].optionIdx:null;

  app.innerHTML=`
  <div class="screen ${transitioning?'out':''}">
    <div style="margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:10px">
          ${current>0?`<button id="prev-btn" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:99px;padding:4px 12px;font-size:12px;color:#aaa;cursor:pointer;font-family:'Noto Sans KR',sans-serif">← 이전</button>`:''}
          <span style="font-size:11px;color:#888;font-weight:700;letter-spacing:1px">SITUATION ${current+1} / ${scenarios.length}</span>
        </div>
        <span style="font-size:11px;color:#555;font-weight:700">${Math.round(progress)}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="tag-pill">${q.tag}</div>
    <div class="situation-card">
      <p class="situation-text">${q.situation}</p>
    </div>
    <p style="font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-weight:700">나라면?</p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:18px">
      ${q.options.map((opt,idx)=>`
        <button class="opt-btn ${selectedIdx===idx?'selected':selectedIdx!==null?'dimmed':''}"
          data-idx="${idx}" ${selectedIdx!==null?'disabled':''}>
          <span class="opt-badge">${idx+1}</span>
          <span>${opt.text}</span>
        </button>`).join('')}
    </div>
    ${selectedIdx!==null?`
      <button class="next-btn" id="next-btn">
        ${current+1>=scenarios.length?'결과 보기 →':'다음 →'}
      </button>`:`
      <button class="next-btn disabled" disabled>선택해줘</button>`}
  </div>`;

  document.querySelectorAll(".opt-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      if(answers[current]!==undefined||transitioning)return;
      const idx=parseInt(btn.dataset.idx);
      answers[current]={optionIdx:idx, type:q.options[idx].type, score:scoreMap[q.options[idx].type]};
      render();
    });
  });
  const prev=document.getElementById("prev-btn");
  if(prev) prev.addEventListener("click",()=>{
    if(current>0){
      totalScore-=(answers[current-1]?answers[current-1].score:0);
      delete answers[current];
      current--;
      render();
    }
  });
  const nxt=document.getElementById("next-btn");
  if(nxt) nxt.addEventListener("click",()=>{
    if(transitioning)return;
    transitioning=true;
    totalScore+=answers[current].score;
    setTimeout(()=>{
      if(current+1>=scenarios.length){
        phase="result";
        if(!countedThisSession){countedThisSession=true;incrementCount();}
      } else {
        current++;
      }
      transitioning=false;render();
    },320);
  });
}
