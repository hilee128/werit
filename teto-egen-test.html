<style>
:root {
  --bg: #ffffff;
  --surface: #ffffff;
  --teto: #ff6b6b;
  --teto-l: #ff9a9a;
  --teto-p: #fff0f0;
  --egen: #6bcfff;
  --egen-l: #9adeff;
  --egen-p: #f0f9ff;
  --sens: #b06bff;
  --sens-l: #ce9aff;
  --sens-p: #f7f0ff;
  --mutt: #6bffb0;
  --mutt-l: #9affcc;
  --mutt-p: #f0fff7;
  --ink: #1a1a2e;
  --slate: #4a4a6a;
  --muted: #9898b8;
  --border: #ede8e0;
  --peach: #ffb347;
  --peach-p: #fff4e0;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  font-family: 'Gowun Dodum', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 배경 패턴 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: none;
  pointer-events: none;
  z-index: 0;
}

.wrap {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pop {
  0%   { transform:scale(1); }
  50%  { transform:scale(0.96); }
  100% { transform:scale(1); }
}
@keyframes float {
  0%,100% { transform:translateY(0); }
  50%      { transform:translateY(-6px); }
}
@keyframes shimmer {
  0%   { background-position:-200% center; }
  100% { background-position:200% center; }
}

.page { display:none; flex:1; flex-direction:column; }
.page.on { display:flex; }

/* ══════════════════════════════
   인트로
══════════════════════════════ */
.intro-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 28px;
  text-align: center;
  animation: fadeUp 0.7s ease both;
}

.intro-icons {
  display: flex;
  gap: 10px;
  margin-bottom: 32px;
  animation: float 3s ease infinite;
}
.intro-hearts {
  margin-bottom: 28px;
  animation: float 3s ease infinite;
}

.type-bubble {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  letter-spacing: -0.5px;
}

.intro-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 28px;
  font-weight: 900;
  line-height: 1.4;
  color: var(--ink);
  margin-bottom: 12px;
}

.intro-title .hl {
  background: linear-gradient(135deg, var(--teto), var(--egen));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.intro-sub {
  font-size: 14px;
  color: var(--slate);
  line-height: 1.8;
  margin-bottom: 40px;
}

.intro-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 40px;
}

.intro-tag {
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
}

.btn-start {
  width: 100%;
  max-width: 320px;
  padding: 18px;
  background: #1a1a2e;
  color: white;
  border: none;
  border-radius: 18px;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,26,46,0.15);
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
}
.btn-start:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(26,26,46,0.2); }
.btn-start:active { animation: pop 0.2s ease; }


/* 이름 입력 */
.name-input-wrap {
  width: 100%;
  max-width: 320px;
  margin-bottom: 20px;
}
.name-input-label {
  font-size: 12px;
  color: var(--muted);
  font-family: 'Noto Sans KR', sans-serif;
  margin-bottom: 8px;
  display: block;
  text-align: left;
  letter-spacing: 0.3px;
}
.name-input {
  width: 100%;
  padding: 14px 18px;
  background: #f7f7fa;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  font-size: 15px;
  font-family: 'Gowun Dodum', sans-serif;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.name-input::placeholder { color: var(--muted); }
.name-input:focus { border-color: var(--teto); background: white; }
/* ══════════════════════════════
   진행바 헤더
══════════════════════════════ */
.test-header {
  padding: 14px 24px 12px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}

.prog-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.prog-axis {
  display: flex;
  align-items: center;
  gap: 6px;
}

.axis-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

.prog-axis-label {
  font-size: 11px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--slate);
}

.prog-count {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  color: var(--muted);
}

.prog-count b {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
}

.prog-track {
  height: 6px;
  background: var(--border);
  border-radius: 100px;
  overflow: hidden;
}

.prog-bar {
  height: 100%;
  border-radius: 100px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  background: linear-gradient(90deg, var(--teto), var(--peach), var(--sens));
  background-size: 200% 100%;
  animation: shimmer 3s linear infinite;
}

/* ══════════════════════════════
   질문 영역
══════════════════════════════ */
.test-body {
  flex: 1;
  padding: 16px 24px 32px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: stretch;
}

.q-wrap {
  animation: fadeUp 0.35s ease both;
}

.q-num-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}

.q-num-badge {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  color: white;
}

.q-axis-label {
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.q-axis-name {
  font-size: 11px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--muted);
  text-transform: uppercase;
}

.q-text {
  font-size: 20px;
  line-height: 1.65;
  color: var(--ink);
  margin-bottom: 32px;
  word-break: keep-all;
}

/* 선택지 */
.choices {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.choice-btn {
  width: 100%;
  padding: 20px 22px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 16px;
  text-align: left;
  font-size: 15px;
  font-family: 'Gowun Dodum', sans-serif;
  color: var(--slate);
  cursor: pointer;
  line-height: 1.6;
  word-break: keep-all;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.choice-btn:hover {
  border-color: var(--border);
  background: var(--surface);
}

@media (hover: hover) {
  .choice-btn:hover {
    border-color: var(--peach);
    background: var(--peach-p);
  }
}

.choice-btn.picked {
  border-color: var(--teto);
  background: var(--teto-p);
  color: var(--ink);
}

.choice-btn.picked.sm {
  border-color: var(--sens);
  background: var(--sens-p);
}

.choice-btn.dimmed {
  opacity: 0.35;
}

.choice-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--muted);
  flex-shrink: 0;
}

.choice-btn.picked .choice-letter { background: var(--teto); color: white; }
.choice-btn.picked.sm .choice-letter { background: var(--sens); color: white; }

/* ══════════════════════════════
   결과
══════════════════════════════ */
.result-page {
  padding: 0 0 60px;
  animation: fadeUp 0.7s ease both;
}

/* 결과 히어로 */
.result-hero {
  padding: 40px 28px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.result-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.06;
  background: repeating-linear-gradient(
    45deg,
    var(--teto) 0px, var(--teto) 1px,

  );
}

.result-eyebrow {
  font-size: 11px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.result-type-big {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 52px;
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 8px;
  letter-spacing: -1px;
}

.result-type-name {
  font-size: 15px;
  color: var(--slate);
  margin-bottom: 24px;
}

.result-desc-card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: left;
  font-size: 14px;
  color: var(--slate);
  line-height: 1.8;
  border: 1.5px solid var(--border);
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}

/* 4가지 축 점수 */
.score-section {
  padding: 0 24px;
  margin-bottom: 24px;
}

.section-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.axis-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.axis-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  text-align: center;
}

.axis-card.dominant { border-width: 2px; }

.axis-card-label {
  font-size: 10px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.axis-card-type {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 4px;
}

.axis-card-pct {
  font-size: 24px;
  font-weight: 900;
  font-family: 'Noto Sans KR', sans-serif;
  line-height: 1;
  margin-bottom: 2px;
}

.axis-card-sub {
  font-size: 11px;
  color: var(--muted);
}

/* 바 */
.axis-bar-wrap { margin-bottom: 8px; }

.axis-bar-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
}

.axis-bar-label {
  font-size: 11px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
}

.axis-bar-track {
  height: 10px;
  background: var(--border);
  border-radius: 100px;
  overflow: hidden;
  position: relative;
}

.axis-bar-fill {
  height: 100%;
  border-radius: 100px;
  width: 0%;
  transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
}

.axis-bar-pct {
  font-size: 10px;
  color: var(--muted);
  text-align: right;
  margin-top: 3px;
  font-family: 'Noto Sans KR', sans-serif;
}

/* 커플 조합 결과 */
.couple-section {
  padding: 0 24px;
  margin-bottom: 24px;
}

.couple-input-area {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 20px;
}

.couple-input-title {
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 14px;
  text-align: center;
}

.type-select-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.type-select-btn {
  padding: 10px 8px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 600;
  color: var(--slate);
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: center;
}

.type-select-btn:hover { border-color: var(--peach); }
.type-select-btn.selected { color: white; }

.btn-couple-result {
  width: 100%;
  padding: 14px;
  background: var(--ink);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}
.btn-couple-result:hover { background: #2a2a4e; transform: translateY(-1px); }

/* 조합 결과 카드 */
.combo-result {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 22px;
  margin-top: 12px;
  display: none;
}

.combo-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 18px;
  font-weight: 900;
  color: var(--ink);
  text-align: center;
  margin-bottom: 6px;
}

.combo-badge {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 100px;
  font-size: 11px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  margin-bottom: 14px;
}

.combo-features {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}

.combo-feature {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 13px;
  color: var(--slate);
  line-height: 1.6;
}

.combo-divider {
  height: 1px;
  background: var(--border);
  margin: 12px 0;
}

.combo-warning {
  font-size: 12px;
  color: var(--slate);
  line-height: 1.7;
  padding: 12px;
  background: #fff8f0;
  border-radius: 10px;
  border-left: 3px solid var(--peach);
}

/* 유형별 설명 */
.type-detail-section {
  padding: 0 24px;
  margin-bottom: 24px;
}

.type-detail-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 22px;
  margin-bottom: 12px;
}

.tdcard-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.tdcard-badge {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 900;
  color: white;
}

.tdcard-name {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
}

.tdcard-sub {
  font-size: 11px;
  color: var(--muted);
}

.tdcard-desc {
  font-size: 13px;
  color: var(--slate);
  line-height: 1.85;
}

/* 다시 버튼 */
.retry-section {
  padding: 0 24px;
}

.btn-retry {
  width: 100%;
  padding: 16px;
  background: transparent;
  border: 2px solid var(--border);
  border-radius: 16px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 600;
  color: var(--slate);
  cursor: pointer;
  transition: all 0.2s ease;
}
.btn-retry:hover { border-color: var(--teto); color: var(--teto); }
</style>
</head>
<body>
<div class="wrap">

<!-- ══ 인트로 ══ -->
<div id="p-intro" class="page on">
  <div class="intro-wrap">
    <div class="intro-hearts">
      <svg width="72" height="68" viewBox="0 0 72 68" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M36 64S4 44 4 20a16 16 0 0 1 32 0 16 16 0 0 1 32 0C68 44 36 64 36 64z" fill="url(#hg)"/>
        <defs>
          <linearGradient id="hg" x1="4" y1="4" x2="68" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ff6b6b"/>
            <stop offset="50%" stop-color="#b06bff"/>
            <stop offset="100%" stop-color="#6bcfff"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <h1 class="intro-title">
      나는 연애할 때<br/>어떤 유형과 잘 맞을까?
    </h1>
    <p class="intro-sub">
      테토·에겐·섬세·무던 25문항으로<br/>
      내 연애 유형과 딱 맞는 상대를 찾아보세요
    </p>

    <div class="intro-tags">
      <span class="intro-tag" style="background:var(--teto-p);color:var(--teto)">🔥 테토</span>
      <span class="intro-tag" style="background:var(--egen-p);color:#1a9fd4">💙 에겐</span>
      <span class="intro-tag" style="background:var(--sens-p);color:var(--sens)">🌸 섬세</span>
      <span class="intro-tag" style="background:var(--mutt-p);color:#2db87a">🌿 무던</span>
    </div>

    <div class="name-input-wrap">
      <label class="name-input-label">이름 또는 닉네임 (선택)</label>
      <input class="name-input" id="user-name" type="text" placeholder="예) 해리쉬, 민준이" maxlength="10">
    </div>
    <button class="btn-start" onclick="startTest()">테스트 시작하기 →</button>
  </div>
</div>

<!-- ══ 검사 ══ -->
<div id="p-test" class="page">
  <div class="test-header">
    <div class="prog-top">
      <div class="prog-axis">
        <div class="axis-dot" id="pdot"></div>
        <span class="prog-axis-label" id="paxis">테토 / 에겐</span>
      </div>
      <div class="prog-count"><b id="pnum">1</b> / 25</div>
    </div>
    <div class="prog-track">
      <div class="prog-bar" id="pbar" style="width:4.1%"></div>
    </div>
  </div>

  <div class="test-body">
    <div id="qarea"></div>
  </div>
</div>

<!-- ══ 결과 ══ -->
<div id="p-result" class="page">
  <div class="result-page" id="result-content"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// 질문 데이터 (24문항)
// ══════════════════════════════════════════════════════════════
// ax: TE=테토/에겐, SM=섬세/무던
// pole A = 테토 or 섬세, pole B = 에겐 or 무던

const AX_INFO = {
  TE: { label:'테토 / 에겐', colorA: 'var(--teto)', colorB: 'var(--egen)' },
  SM: { label:'섬세 / 무던', colorA: 'var(--sens)', colorB: '#2db87a' },
};

let cur = 0;
let scores = { TE_A:0, TE_B:0, SM_A:0, SM_B:0 };
let ansPoles = {};

function startTest() {
  const nameEl = document.getElementById('user-name');
  const name = nameEl ? nameEl.value.trim() : '';
  if (name) localStorage.setItem('teto_user_name', name);
  show('p-test');
  renderQ();
}

function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}

function renderQ() {
  const q = QS[cur];
  const total = QS.length;
  const ax = AX_INFO[q.ax];

  document.getElementById('pbar').style.width = ((cur+1)/total*100)+'%';
  document.getElementById('pnum').textContent = cur+1;
  document.getElementById('paxis').textContent = ax.label;
  document.getElementById('pdot').style.background = ax.colorA;
  document.getElementById('pdot').style.boxShadow = `0 0 8px ${ax.colorA}`;

  // 기존 area를 완전히 새 div로 교체 — 이전 인라인 스타일 잔상 원천 차단
  const oldArea = document.getElementById('qarea');
  const newArea = document.createElement('div');
  newArea.id = 'qarea';
  oldArea.parentNode.replaceChild(newArea, oldArea);

  newArea.innerHTML = `
    <div class="q-wrap">
      <div class="q-num-row">
        <div class="q-num-badge" style="background:${ax.colorA}">${cur+1}</div>
        <span class="q-axis-label" style="color:${ax.colorA}">${ax.label}</span>
      </div>
      <p class="q-text">${q.text}</p>
      <div class="choices">
        <button class="choice-btn" onclick="pick('A')" id="choiceA">
          <div class="choice-letter">A</div>
          <span>${q.a}</span>
        </button>
        <button class="choice-btn" onclick="pick('B')" id="choiceB">
          <div class="choice-letter">B</div>
          <span>${q.b}</span>
        </button>
      </div>
    </div>`;

  newArea.style.animation='none'; newArea.offsetHeight;
  newArea.style.animation='fadeUp 0.35s ease both';
}

function pick(pole) {
  const q = QS[cur];
  const key = q.ax + '_' + pole;
  scores[key] = (scores[key]||0) + 1;
  ansPoles[q.id] = pole;

  const btnA = document.getElementById('choiceA');
  const btnB = document.getElementById('choiceB');

  // 누른 버튼만 색 표시, 나머지는 흐리게
  const isSM = q.ax === 'SM';
  if (pole === 'A') {
    btnA.classList.add('picked');
    if (isSM) btnA.classList.add('sm');
    btnB.classList.add('dimmed');
  } else {
    btnB.classList.add('picked');
    if (isSM) btnB.classList.add('sm');
    btnA.classList.add('dimmed');
  }

  // 중복 클릭 방지
  btnA.onclick = null;
  btnB.onclick = null;

  // 300ms 후 fadeOut → 다음 문항
  setTimeout(() => {
    const area = document.getElementById('qarea');
    area.style.transition = 'opacity 0.2s ease';
    area.style.opacity = '0';
    setTimeout(() => {
      area.style.transition = '';
      area.style.opacity = '1';
      if (cur === QS.length - 1) {
        buildResult();
      } else {
        cur++;
        renderQ();
      }
    }, 200);
  }, 300);
}

function buildResult() {

  const tePct = Math.round(scores.TE_A / teTotal * 100);

  const sensPct = Math.round(scores.SM_A / smTotal * 100);
  const muttPct = 100 - sensPct;

  const isTeto = tePct >= egPct;
  const isSens = sensPct >= muttPct;

  const myType = (isTeto ? '테토' : '에겐') + ' + ' + (isSens ? '섬세' : '무던');

    <div class="result-hero" style="background:linear-gradient(160deg, ${typeData.bg1}, ${typeData.bg2})">

      <div class="result-type-big" style="background:linear-gradient(135deg,${typeData.c1},${typeData.c2});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${myType}</div>

      <div class="result-desc-card">

        ${typeData.desc}
      </div>
    </div>

    <!-- 점수 -->
    <div class="score-section">
      <div class="section-title">📊 측정 점수</div>

      <div class="axis-cards">
        <div class="axis-card ${isTeto?'dominant':''}" style="${isTeto?'border-color:var(--teto);background:var(--teto-p)':''}">
          <div class="axis-card-label" style="color:var(--teto)">테토형</div>
          <div class="axis-card-pct" style="color:var(--teto)">${tePct}%</div>
          <div class="axis-card-sub">${isTeto?'✓ 주 유형':''}  ${scores.TE_A}점</div>
        </div>
        <div class="axis-card ${!isTeto?'dominant':''}" style="${!isTeto?'border-color:var(--egen);background:var(--egen-p)':''}">
          <div class="axis-card-label" style="color:#1a9fd4">에겐형</div>
          <div class="axis-card-pct" style="color:#1a9fd4">${egPct}%</div>
          <div class="axis-card-sub">${!isTeto?'✓ 주 유형':''}  ${scores.TE_B}점</div>
        </div>
        <div class="axis-card ${isSens?'dominant':''}" style="${isSens?'border-color:var(--sens);background:var(--sens-p)':''}">
          <div class="axis-card-label" style="color:var(--sens)">섬세형</div>
          <div class="axis-card-pct" style="color:var(--sens)">${sensPct}%</div>
          <div class="axis-card-sub">${isSens?'✓ 주 유형':''}  ${scores.SM_A}점</div>
        </div>
        <div class="axis-card ${!isSens?'dominant':''}" style="${!isSens?'border-color:#2db87a;background:var(--mutt-p)':''}">

          <div class="axis-card-sub">${!isSens?'✓ 주 유형':''}  ${scores.SM_B}점</div>
        </div>
      </div>

      <!-- 바 -->
      <div class="axis-bar-wrap">
        <div class="axis-bar-labels">
          <span class="axis-bar-label" style="color:var(--teto)">테토 ${tePct}%</span>
          <span class="axis-bar-label" style="color:#1a9fd4">에겐 ${egPct}%</span>
        </div>
        <div class="axis-bar-track">
          ${isTeto
            ? `<div class="axis-bar-fill" style="background:linear-gradient(90deg,var(--teto),var(--teto-l))" data-w="${tePct}"></div>`
            : `<div class="axis-bar-fill" style="background:linear-gradient(90deg,var(--egen),var(--egen-l));margin-left:auto" data-w="${egPct}"></div>`
          }
        </div>
      </div>

        <div class="axis-bar-labels">
          <span class="axis-bar-label" style="color:var(--sens)">섬세 ${sensPct}%</span>

    <div class="retry-section">
      <button class="btn-retry" onclick="location.reload()">🔄 처음부터 다시하기</button>
    </div>
  `;

  show('p-result');
  incrementCount('teto_egen_test');

  // Google Analytics 완료 이벤트 전송
  trackTestComplete(myType);

  setTimeout(() => {
    document.querySelectorAll('.axis-bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 500);
}

let selectedPartner = null;

function selectPartner(type, btn) {
  selectedPartner = type;
  document.querySelectorAll('.type-select-btn').forEach(b => {
    b.classList.remove('selected');
    b.style.background = '';
    b.style.color = '';
    b.style.borderColor = '';
  });
  btn.classList.add('selected');
  btn.style.background = 'var(--teto)';
  btn.style.borderColor = 'var(--teto)';
  btn.style.color = 'white';
}

function showCombo(myType) {
  if (!selectedPartner) {
    alert('상대방 유형을 먼저 선택해주세요');
    return;
  }
  const combo = getComboData(myType, selectedPartner);
  const el = document.getElementById('combo-result');
  el.style.display = 'block';
  el.innerHTML = `
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-size:12px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;margin-bottom:6px">우리 조합</div>
      <div class="combo-title">${myType} × ${selectedPartner}</div>
      <span class="combo-badge" style="background:${combo.badgeBg};color:${combo.badgeColor}">${combo.badge}</span>
    </div>
    <div class="combo-features">
      ${combo.features.map(f=>`<div class="combo-feature"><span>💗</span><span>${f}</span></div>`).join('')}
    </div>
    <div class="combo-divider"></div>
    <div class="combo-warning">⚠️ ${combo.warning}</div>
  `;

  el.scrollIntoView({ behavior:'smooth', block:'center' });
}

async function getCount(testName) {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/test_counts?test_name=eq.${testName}&select=count`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    const data = await res.json();
    return data.length > 0 ? data[0].count : 0;
  } catch(e) { return 0; }
}

async function incrementCount(testName) {
  const res = await fetch(`${SUPA_URL}/rest/v1/test_counts?test_name=eq.${testName}&select=count`, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  });
  const data = await res.json();
  if (data.length === 0) {
    await fetch(`${SUPA_URL}/rest/v1/test_counts`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ test_name: testName, count: 1 })
    });
  } else {
    await fetch(`${SUPA_URL}/rest/v1/test_counts?test_name=eq.${testName}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ count: data[0].count + 1 })
    });
  }
}

async function showCountBadge(testName, elementId) {
  const n = await getCount(testName);
  const el = document.getElementById(elementId);
  if (el) el.textContent = n.toLocaleString() + '명이 완료했어요';
}
