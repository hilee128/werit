  if(phase==="intro") renderIntro(app);

function renderMbti(app){

      <div class="label" style="letter-spacing:3px">STEP 1 / 2</div>
      <div style="font-size:20px;font-weight:900;color:#111;margin-bottom:6px">나의 MBTI는?</div>

    <button class="btn-primary ${mbti?'':'disabled'}" id="mbti-next">다음 →</button>

      const m=btn.dataset.mbti;
      mbti=mbti===m?null:m;
      document.querySelectorAll(".mbti-btn").forEach(b=>b.classList.toggle("active",b.dataset.mbti===mbti));

function updateMbtiPreview(){
  const el=document.getElementById("mbti-preview");
  if(!el)return;
  if(mbti&&mbtiComment[mbti]){
    el.style.display="block";
    el.className="mbti-preview";
    el.innerHTML=`<div class="mbti-preview-label">${mbti} · ${mbtiComment[mbti].label}</div><div class="mbti-preview-text">${mbtiComment[mbti].comment}</div>`;
  } else {
    el.style.display="none";
  }
}

function renderQuiz(app){
  const q=questions[current];
  const progress=Math.round((current/questions.length)*100);
  app.innerHTML=`
  <div class="screen quiz ${transitioning?'out':''}">
    <div class="progress-wrap">
      <div class="progress-top"><span class="left">Q ${current+1} / ${questions.length}</span><span>${progress}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="q-card"><p class="q-text">${q.situation}</p></div>
    <div class="opt-list">
      ${q.options.map((opt,idx)=>`
        <button class="opt-btn ${selected===idx?'active':''} ${selected!==null&&selected!==idx?'dim':''}" data-idx="${idx}">
          <span class="badge">${["A","B","C"][idx]}</span>
          <span>${opt.text}</span>
        </button>`).join("")}
    </div>
    ${selected!==null?`<div class="next-wrap"><button class="btn-primary" id="quiz-next">${current+1>=questions.length?"결과 보기 →":"다음 →"}</button></div>`:""}
  </div>`;
  document.querySelectorAll(".opt-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      if(transitioning)return;
      const idx=parseInt(btn.dataset.idx);
      selected=selected===idx?null:idx;
      render();
    });
  });
  const nxt=document.getElementById("quiz-next");
  if(nxt) nxt.addEventListener("click",()=>{
    if(selected===null||transitioning)return;
    transitioning=true;
    const newTotal=total+q.options[selected].score;
    setTimeout(()=>{
      if(current+1>=questions.length){total=newTotal;verdict=calcVerdict(newTotal);phase="result";}
      else{total=newTotal;current++;selected=null;}
      transitioning=false;render();
    },350);
  });
}

      </div>
      <div class="block">
        <div class="block-label">🌱 지금 당장 해봐</div>
        <div class="block-text">${r.solution}</div>
      </div>
      ${jobData?`<div class="block">

      <button class="btn-secondary" id="restart-btn">다시 테스트하기 🔄</button>
    </div>
    <div class="share-note">친구한테도 공유해봐 👀</div>
  </div>`;
  document.getElementById("restart-btn").addEventListener("click",()=>{
    phase="intro";nickname="";mbti=null;field=null;current=0;total=0;selected=null;transitioning=false;verdict=null;countedThisSession=false;
    render();
  });
}

render();
