<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>똥차 만남 정도 테스트 🚗💨</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #ff4757;
    --accent2: #ffa502;
    --accent3: #2ed573;
    --selected: #ff4757;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* INTRO SCREEN */
  #intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    position: relative;
    background: #0f0f0f;
  }

  .bg-emoji {
    position: absolute;
    font-size: 100px;
    opacity: 0.05;
    pointer-events: none;
    animation: float 6s ease-in-out infinite;
    z-index: 0;
  }

  .bg-emoji:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
  .bg-emoji:nth-child(2) { top: 60%; right: 5%; animation-delay: 2s; }
  .bg-emoji:nth-child(3) { bottom: 15%; left: 20%; animation-delay: 4s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }

  .intro-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 24px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .intro-title {
    font-size: clamp(36px, 10vw, 60px);
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .intro-title .highlight {
    color: var(--accent);
    position: relative;
    display: inline-block;
  }

  .intro-title .highlight::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0.3;
  }

  .intro-sub {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 40px;
    line-height: 1.7;
    position: relative;
    z-index: 1;
  }

  .intro-sub strong {
    color: var(--text);
    font-weight: 500;
  }

  .start-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 18px 48px;
    font-size: 17px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border-radius: 100px;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: all 0.2s;
    box-shadow: 0 8px 30px rgba(255,71,87,0.4);
  }

  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,71,87,0.5); }
  .start-btn:active { transform: translateY(0); }

  .warning-text {
    margin-top: 20px;
    font-size: 12px;
    color: #555;
    position: relative;
    z-index: 1;
  }

  /* QUIZ SCREEN */
  #quiz {
    display: none;
    min-height: 100vh;
    padding: 0 0 60px;
    background: #0f0f0f;
    color: #f0f0f0;
  }

  .progress-bar-wrap {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 16px 24px;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .question-wrap {
    padding: 36px 24px 0;
    max-width: 540px;
    margin: 0 auto;
  }

  .q-num {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .q-emoji {
    font-size: 40px;
    margin-bottom: 14px;
    display: block;
  }

  .q-text {
    font-size: clamp(18px, 5vw, 22px);
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .q-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .option-btn:hover {
    border-color: var(--accent);
    background: #1f1f1f;
    transform: translateX(4px);
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: rgba(255,71,87,0.1);
  }

  .option-btn.selected::before {
    content: '✓';
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-weight: 700;
    font-size: 16px;
  }

  .opt-main {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    padding-right: 30px;
  }

  .opt-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.5;
  }

  .next-btn {
    display: block;
    margin: 28px auto 0;
    background: var(--accent);
    color: white;
    border: none;
    padding: 16px 40px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
  }

  .next-btn.visible {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }

  .next-btn:hover { transform: translateY(-2px); }

  /* RESULT SCREEN */
  #result {
    display: none;
    min-height: 100vh;
    padding: 0 24px 80px;
    max-width: 540px;
    margin: 0 auto;
    background: #0f0f0f;
    color: #f0f0f0;
  }

  .result-header {
    padding: 50px 0 32px;
    text-align: center;
  }

  .result-emoji {
    font-size: 72px;
    margin-bottom: 16px;
    display: block;
    animation: bounceIn 0.6s cubic-bezier(0.68,-0.55,0.27,1.55);
  }

  @keyframes bounceIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-level {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .result-title {
    font-size: clamp(26px, 7vw, 36px);
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 14px;
  }

  .result-title .color-accent { color: var(--accent); }
  .result-title .color-orange { color: var(--accent2); }
  .result-title .color-green { color: var(--accent3); }

  .result-score-bar {
    background: var(--border);
    height: 10px;
    border-radius: 100px;
    overflow: hidden;
    margin: 20px 0;
    position: relative;
  }

  .score-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1) 0.3s;
  }

  .score-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .result-desc-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    margin: 24px 0;
  }

  .result-desc-card p {
    font-size: 15px;
    line-height: 1.9;
    color: #ddd;
  }

  .result-desc-card p + p {
    margin-top: 12px;
  }

  .keyword-wrap {
    margin: 24px 0;
  }

  .keyword-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .keyword {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
  }

  .tips-card {
    background: rgba(255,71,87,0.06);
    border: 1.5px solid rgba(255,71,87,0.2);
    border-radius: 20px;
    padding: 24px;
    margin: 24px 0;
  }

  .tips-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 14px;
    letter-spacing: 0.05em;
  }

  .tip-item {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    font-size: 14px;
    line-height: 1.7;
    color: #ccc;
  }

  .tip-item:last-child { margin-bottom: 0; }

  .tip-dot {
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .retry-btn {
    display: block;
    width: 100%;
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
    padding: 16px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    border-radius: 100px;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s;
  }

  .retry-btn:hover { border-color: var(--text); color: var(--text); }

  .share-note {
    text-align: center;
    font-size: 12px;
    color: #444;
    margin-top: 20px;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in {
    animation: slideUp 0.4s ease both;
  }
</style>
</head>
<body>

<div class="bg-emoji">🚗</div>
<div class="bg-emoji">💀</div>

<!-- INTRO -->
<div id="intro">

    10문항으로 알아보는 당신의 똥차 인력 🧲
  </p>
  <button class="start-btn" onclick="startQuiz()">테스트 시작하기 →</button>
  <p class="warning-text">※ 결과가 마음에 안 들어도 저한테 화내지 마세요</p>
</div>

<!-- QUIZ -->
<div id="quiz">

<!-- RESULT -->
<div id="result">

  </div>

  </div>

  <div class="tips-card" id="result-tips"></div>

  <button class="retry-btn" onclick="resetQuiz()">🔄 다시 하기</button>
  <p class="share-note">결과 캡쳐해서 스토리에 올려봐 👀</p>
</div>

let currentQ = 0;
let totalScore = 0;
let answered = false;

function startQuiz() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  answered = false;

  document.getElementById('q-counter').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-num').textContent = `Q ${String(currentQ + 1).padStart(2, '0')}`;
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-sub').textContent = q.sub;

  const pct = ((currentQ + 1) / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  const labels = ['잠깐, 솔직하게 해', '계속 해봐', '거의 다 왔어', '마지막이야'];
  const labelIdx = Math.floor((currentQ / questions.length) * labels.length);
  document.getElementById('q-label').textContent = labels[Math.min(labelIdx, labels.length - 1)];

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn animate-in';
    btn.style.animationDelay = (i * 0.08) + 's';
    btn.innerHTML = `<div class="opt-main">${opt.text}</div><div class="opt-sub">${opt.sub}</div>`;
    btn.onclick = () => selectOption(btn, opt.score);
    optionsEl.appendChild(btn);
  });

  const nextBtn = document.getElementById('next-btn');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = currentQ === questions.length - 1 ? '결과 보기 →' : '다음 →';
}

function selectOption(btn, score) {
  if (answered) return;

  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  btn.dataset.score = score;

  answered = true;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.add('visible');
  nextBtn.dataset.pendingScore = score;
}

function nextQuestion() {
  const pendingScore = parseInt(document.getElementById('next-btn').dataset.pendingScore || 0);
  totalScore += pendingScore;
  currentQ++;

  if (currentQ >= questions.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const res = results.find(r => totalScore >= r.min && totalScore <= r.max) || results[results.length - 1];

  document.getElementById('result-emoji').textContent = res.emoji;
  document.getElementById('result-level').textContent = res.level;
  document.getElementById('result-title').innerHTML = res.titleHtml;

  const fill = document.getElementById('score-fill');
  fill.style.background = res.scoreColor;
  setTimeout(() => { fill.style.width = res.scorePercent + '%'; }, 100);

  const descCard = document.getElementById('result-desc');
  descCard.innerHTML = res.desc.map(d => `<p>${d}</p>`).join('');

  const kwEl = document.getElementById('result-keywords');
  kwEl.innerHTML = res.keywords.map(k => `<span class="keyword">${k}</span>`).join('');

  const tipsEl = document.getElementById('result-tips');
  tipsEl.innerHTML = `<div class="tips-title">${res.tipsTitle}</div>` +
    res.tips.map(t => `<div class="tip-item"><span class="tip-dot">→</span><span>${t}</span></div>`).join('');
}

function resetQuiz() {
  currentQ = 0;
  totalScore = 0;
  answered = false;
  document.getElementById('result').style.display = 'none';
  document.getElementById('intro').style.display = 'flex';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
