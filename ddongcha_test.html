<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나는 똥차 판별을 잘할까? — werit</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #ff4757;
    --accent2: #ffa502;
    --accent3: #2ed573;
    --selected: #ff4757;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* INTRO SCREEN */
  #intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 28px;
    text-align: center;
    max-width: 480px;
    margin: 0 auto;
  }

  .intro-emoji {
    font-size: 72px;
    margin-bottom: 20px;
    line-height: 1;
    animation: bounceIn 0.6s cubic-bezier(0.68,-0.55,0.27,1.55);
  }

  .intro-badge {
    display: inline-block;
    background: rgba(255,255,255,0.08);
    color: #aaa;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.12);
    margin-bottom: 20px;
  }

  .intro-title {
    font-size: clamp(30px, 8vw, 46px);
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  .intro-title .hl { color: var(--accent2); }

  .intro-sub {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.75;
  }

  .intro-info {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 24px;
    text-align: left;
  }

  .intro-info-item {
    font-size: 13px;
    color: #666;
    padding: 4px 0;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .intro-info-item::before {
    content: '—';
    color: #333;
    flex-shrink: 0;
  }

  .start-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    padding: 18px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Noto Sans KR', sans-serif;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .start-btn:hover { transform: translateY(-2px); opacity: 0.92; }
  .start-btn:active { transform: translateY(0); }

  .warning-text {
    margin-top: 16px;
    font-size: 12px;
    color: #444;
  }

  /* QUIZ SCREEN */
  #quiz {
    display: none;
    min-height: 100vh;
    padding: 0 0 60px;
    background: #0f0f0f;
    color: #f0f0f0;
  }

  .progress-bar-wrap {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 16px 24px;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .question-wrap {
    padding: 36px 24px 0;
    max-width: 540px;
    margin: 0 auto;
  }

  .q-num {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .q-emoji {
    font-size: 40px;
    margin-bottom: 14px;
    display: block;
  }

  .q-text {
    font-size: clamp(18px, 5vw, 22px);
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .q-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .option-btn:hover {
    border-color: var(--accent);
    background: #1f1f1f;
    transform: translateX(4px);
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: rgba(255,71,87,0.1);
  }

  .option-btn.selected::before {
    content: '✓';
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-weight: 700;
    font-size: 16px;
  }

  .opt-main {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    padding-right: 30px;
  }

  .opt-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.5;
  }

  .next-btn {
    display: block;
    margin: 28px auto 0;
    background: var(--accent);
    color: white;
    border: none;
    padding: 16px 40px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
  }

  .next-btn.visible {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }

  .next-btn:hover { transform: translateY(-2px); }

  /* RESULT SCREEN */
  #result {
    display: none;
    padding: 60px 24px 80px;
    max-width: 540px;
    margin: 0 auto;
    background: #0f0f0f;
    color: #f0f0f0;
    width: 100%;
  }

  .result-emoji {
    font-size: 64px;
    margin-bottom: 12px;
    text-align: center;
    display: block;
    animation: bounceIn 0.6s cubic-bezier(0.68,-0.55,0.27,1.55);
  }

  @keyframes bounceIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-nickname {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 6px;
  }
  .result-nickname strong { color: #fff; font-weight: 700; }

  .result-level {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-align: center;
    margin-bottom: 12px;
    font-weight: 700;
  }

  .result-title {
    font-size: 26px;
    font-weight: 900;
    text-align: center;
    line-height: 1.4;
    margin-bottom: 24px;
    white-space: pre-line;
  }

  .result-bar-wrap { width: 100%; margin-bottom: 8px; }
  .result-score-bar {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .score-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 1s ease 0.3s;
    width: 0%;
  }

  .score-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }

  .result-desc-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin: 20px 0;
  }

  .result-desc-card p {
    font-size: 14px;
    line-height: 1.9;
    color: #ccc;
  }

  .result-desc-card p + p { margin-top: 12px; }

  .keyword-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .keyword {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 14px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .tips-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .tips-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--text);
  }

  .tip-item {
    display: flex;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 8px;
  }

  .tip-item:last-child { margin-bottom: 0; }

  .tip-dot {
    color: var(--accent2);
    flex-shrink: 0;
    font-weight: 700;
  }

  .retry-btn {
    display: block;
    width: 100%;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s;
  }
  .retry-btn:hover { border-color: var(--accent2); }

  .share-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 14px;
    font-weight: 800;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .share-btn:active { transform: scale(0.97); }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in {
    animation: slideUp 0.4s ease both;
  }

  .nickname-wrap {
    width: 100%;
    margin: 0 auto 24px;
    position: relative;
    z-index: 1;
  }
  .nickname-label {
    font-size: 11px;
    color: #555;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
    text-align: left;
  }
  .nickname-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 13px 16px;
    color: #f0f0f0;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .nickname-input::placeholder { color: #444; }
  .nickname-input:focus { border-color: rgba(255,255,255,0.35); }

  .result-nickname {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .result-nickname strong { color: #fff; font-weight: 700; }
</style>

<!-- INTRO -->
<div id="intro">
  <div class="intro-emoji">💩</div>
  <div class="intro-badge">LEVEL TEST · 10문항</div>
  <h1 class="intro-title">나는 똥차를<br><span class="hl">얼마나 잘 거를까?</span></h1>
  <p class="intro-sub">10가지 실제 상황으로 알아보는<br>나의 똥차 감지 능력</p>
  <div class="intro-info">
    <div class="intro-info-item">총 10문항 · 3지선다</div>
    <div class="intro-info-item">결과 확인 후 답안지 볼 수 있어요</div>
    <div class="intro-info-item">솔직하게 골라야 의미 있어요</div>
  </div>
  <div class="nickname-wrap">
    <label class="nickname-label" for="nickname-input">이름 또는 닉네임 (선택)</label>
    <input type="text" id="nickname-input" class="nickname-input" placeholder="예) 해리쉬, 햄진이" maxlength="10">
  </div>
  <button class="start-btn" onclick="startQuiz()">시작하기 →</button>
  <p class="warning-text">※ 결과가 마음에 안 들어도 저한테 화내지 마세요</p>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="progress-bar-wrap">
    <div class="progress-info">
      <span id="q-counter">1 / 10</span>
      <span id="q-label">잠깐, 솔직하게 해</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width: 10%"></div>
    </div>
  </div>

  <div class="question-wrap">
    <div class="q-num" id="q-num">Q 01</div>
    <span class="q-emoji" id="q-emoji">🤔</span>
    <div class="q-text" id="q-text">질문 로딩 중...</div>
    <div class="q-sub" id="q-sub"></div>
    <div class="options" id="options"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <span class="result-emoji" id="result-emoji">💩</span>
  <div class="result-nickname" id="result-nickname"></div>
  <div class="result-level" id="result-level"></div>
  <div class="result-title" id="result-title"></div>

  <div class="result-bar-wrap">
    <div class="result-score-bar">
      <div class="score-fill" id="score-fill" style="width: 0%"></div>
    </div>
    <div class="score-label">
      <span>똥차 완전 무방비</span>
      <span id="result-score-txt"></span>
      <span>똥차 감지 만렙</span>
    </div>
  </div>

  <div class="result-desc-card" id="result-desc"></div>
  <div class="keyword-wrap" id="result-keywords"></div>
  <div class="tips-card" id="result-tips"></div>

  <button class="share-btn" onclick="shareResult()">결과 공유하기 📤</button>
  <button class="retry-btn" onclick="resetQuiz()">다시 해보기 🔄</button>
</div>

let currentQ = 0;
let totalScore = 0;
let answered = false;
let nickname = '';

function startQuiz() {
  nickname = (document.getElementById('nickname-input').value || '').trim();
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  answered = false;

  document.getElementById('q-counter').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-num').textContent = `Q ${String(currentQ + 1).padStart(2, '0')}`;
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-sub').textContent = q.sub;

  const pct = ((currentQ + 1) / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  const labels = ['잠깐, 솔직하게 해', '계속 해봐', '거의 다 왔어', '마지막이야'];
  const labelIdx = Math.floor((currentQ / questions.length) * labels.length);
  document.getElementById('q-label').textContent = labels[Math.min(labelIdx, labels.length - 1)];

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn animate-in';
    btn.style.animationDelay = (i * 0.08) + 's';
    btn.innerHTML = `<div class="opt-main">${opt.text}</div><div class="opt-sub">${opt.sub}</div>`;
    btn.onclick = () => selectOption(btn, opt.score);
    optionsEl.appendChild(btn);
  });

  const nextBtn = document.getElementById('next-btn');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = currentQ === questions.length - 1 ? '결과 보기 →' : '다음 →';
}

function selectOption(btn, score) {
  if (answered) return;

  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  btn.dataset.score = score;

  answered = true;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.add('visible');
  nextBtn.dataset.pendingScore = score;
}

function nextQuestion() {
  const pendingScore = parseInt(document.getElementById('next-btn').dataset.pendingScore || 0);
  totalScore += pendingScore;
  currentQ++;

  if (currentQ >= questions.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const res = results.find(r => totalScore >= r.min && totalScore <= r.max) || results[results.length - 1];

  document.getElementById('result-emoji').textContent = res.emoji;
  const nicknameEl = document.getElementById('result-nickname');
  nicknameEl.innerHTML = nickname ? `<strong>${nickname}</strong>의 결과` : '';
  document.getElementById('result-level').textContent = res.level;
  document.getElementById('result-title').textContent = res.title;
  document.getElementById('result-score-txt').textContent = `${totalScore}점`;

  const fill = document.getElementById('score-fill');
  fill.style.background = res.color;
  setTimeout(() => { fill.style.width = res.pct + '%'; }, 100);

  document.getElementById('result-desc').innerHTML = res.desc.map(d => `<p>${d}</p>`).join('');
  document.getElementById('result-keywords').innerHTML = res.keywords.map(k => `<span class="keyword">${k}</span>`).join('');
  document.getElementById('result-tips').innerHTML =
    `<div class="tips-title">${res.tipsTitle}</div>` +
    res.tips.map(t => `<div class="tip-item"><span class="tip-dot">→</span><span>${t}</span></div>`).join('');
}

function shareResult() {
  const level = document.getElementById('result-level').textContent;
  const nick = nickname ? nickname + '의 ' : '';
  const text = `💩 ${nick}똥차 판별 테스트 결과\n\n${level}\n\nwerit에서 테스트 해보기`;
  if (navigator.share) navigator.share({ title: '나는 똥차 판별을 잘할까?', text, url: location.href });
  else navigator.clipboard.writeText(text).then(() => alert('복사됐어요!'));
}

function resetQuiz() {
  currentQ = 0;
  totalScore = 0;
  answered = false;
  document.getElementById('result').style.display = 'none';
  document.getElementById('intro').style.display = 'flex';
  nickname = '';
  const ni = document.getElementById('nickname-input');
  if (ni) ni.value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
