function calcCat(cat){
  const qs=Q.filter(q=>q.cat===cat);
  const sum=qs.reduce((s,q)=>s+(ans[q.id]||0),0);
  return Math.round(sum/(qs.length*5)*100);
}

function calcResult(){
  const s={sec:calcCat("sec"),anx:calcCat("anx"),avd:calcCat("avd"),fear:calcCat("fear")};
  let main="sec";
  const {sec,anx,avd,fear}=s;
  if(fear>=75) main="fear";
  else if(fear>=60&&(avd>=55||anx>=55)) main="fear";
  else if(sec>=70&&anx<50&&avd<50) main="sec";
  else if(anx>avd&&anx>=60) main="anx";
  else if(avd>anx&&avd>=60) main="avd";
  else main=Object.entries(s).reduce((a,b)=>s[a]>b[1]?a:b[0],"sec");
  return {scores:s,main};
}

}
