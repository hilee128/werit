<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연애 궁합 MBTI 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0c0c14;
  --paper: #ffffff;
  --cream: #f7f7f7;
  --gold: #c2318a;
  --gold-l: #e8579a;
  --gold-pale: #fce7f3;
  --rose: #6b2fa0;
  --rose-l: #8b4fc0;
  --rose-pale: #f3e8ff;
  --teal: #e8579a;
  --teal-l: #f4a7c3;
  --teal-pale: #fdeef5;
  --navy: #c2318a;
  --slate: #4a5568;
  --muted: #8892a4;
  --border: #ddd8ce;
  --shadow: rgba(12,12,20,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  position: relative;
}

/* 배경 텍스처 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 15% 85%, rgba(232,87,154,0.07) 0%, transparent 40%),
    radial-gradient(circle at 85% 15%, rgba(196,81,106,0.06) 0%, transparent 40%),
    radial-gradient(circle at 50% 10%, rgba(107,47,160,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.wrap {
  max-width: 700px;
  margin: 0 auto;
  padding: 48px 24px 100px;
  position: relative;
  z-index: 1;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes slideIn {
  from { opacity:0; transform:translateX(-12px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* ── 페이지 전환 ── */
.page { display:none; }
.page.on { display:block; }

/* ── 공통 컴포넌트 ── */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 600;
}

.chip-gold { background: var(--gold-pale); color: var(--gold); border: 1px solid rgba(201,151,58,0.3); }
.chip-rose { background: var(--rose-pale); color: var(--rose); border: 1px solid rgba(196,81,106,0.3); }
.chip-teal { background: var(--teal-pale); color: var(--teal); border: 1px solid rgba(42,124,116,0.3); }

.serif { font-family: 'Noto Serif KR', serif; }

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 24px 0;
}

/* ── 버튼 ── */
.btn {
  display: block;
  width: 100%;
  padding: 16px 24px;
  border-radius: 14px;
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  letter-spacing: 0.3px;
}

.btn-primary {
  background: var(--ink);
  color: var(--paper);
  box-shadow: 0 4px 20px rgba(12,12,20,0.2);
}

.name-input-wrap { margin-bottom: 16px; }
.name-input-label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
  display: block;
}
.name-input {
  width: 100%;
  padding: 12px 16px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.name-input::placeholder { color: var(--muted); }
.name-input:focus { border-color: var(--rose); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(12,12,20,0.28); }

.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-l));
  color: white;
  box-shadow: 0 4px 20px rgba(201,151,58,0.3);
}
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,151,58,0.4); }

.btn-outline {
  background: transparent;
  color: var(--slate);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { border-color: var(--ink); color: var(--ink); }

/* ── 카드 ── */
.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 2px 12px var(--shadow);
}

/* ══════════════════════════════════════
   인트로
══════════════════════════════════════ */
.intro-eyebrow {
  animation: fadeUp 0.6s ease both;
  margin-bottom: 20px;
}

.intro-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 32px;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 14px;
  animation: fadeUp 0.6s 0.08s ease both;
}

.intro-title em {
  font-style: normal;
  background: linear-gradient(135deg, var(--gold), var(--rose));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.intro-desc {
  font-size: 14px;
  color: var(--slate);
  line-height: 1.8;
  margin-bottom: 32px;
  animation: fadeUp 0.6s 0.12s ease both;
}

.intro-modules {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 32px;
  animation: fadeUp 0.6s 0.18s ease both;
}

.module-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  transition: all 0.25s ease;
}
.module-card:hover { border-color: var(--gold); transform: translateY(-2px); }

.module-icon { font-size: 22px; margin-bottom: 8px; }
.module-name { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.module-sub  { font-size: 11px; color: var(--muted); line-height: 1.5; }

/* ══════════════════════════════════════
   진행바
══════════════════════════════════════ */
.prog-area { margin-bottom: 32px; }

.prog-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.prog-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

.prog-label-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--gold);
}

.prog-count { font-size: 12px; color: var(--muted); }

.prog-track {
  height: 3px;
  background: #f0f0f0;
  border-radius: 100px;
  overflow: hidden;
}

.prog-bar {
  height: 100%;
  background: linear-gradient(90deg, #f9d0e0, #f4a7c3, #e8579a, #c2318a, #6b2fa0);
  border-radius: 100px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}

/* ══════════════════════════════════════
   질문
══════════════════════════════════════ */
.q-wrap {
  animation: fadeUp 0.4s ease both;
}

.q-cat-tag {
  margin-bottom: 14px;
}

.q-text {
  font-family: 'Noto Serif KR', serif;
  font-size: 17px;
  font-weight: 400;
  line-height: 1.75;
  color: var(--ink);
  margin-bottom: 24px;
}

/* 5점 척도 */
.scale-group {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.sc {
  flex: 1;
  aspect-ratio: 1;
  max-height: 52px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sc:hover { border-color: var(--gold); color: var(--ink); background: var(--gold-pale); }
.sc.on { background: var(--ink); border-color: var(--ink); color: white; }

.scale-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

/* 객관식 */
.choice-group { display: flex; flex-direction: column; gap: 10px; }

.choice {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 18px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
}
.choice:hover { background: var(--gold-pale); border-color: rgba(201,151,58,0.5); }
.choice.on { background: var(--ink); border-color: var(--ink); }

.choice-radio {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
}
.choice.on .choice-radio { border-color: white; background: white; }
.choice.on .choice-radio::after { content:''; width:8px; height:8px; border-radius:50%; background:var(--ink); }

.choice-text { font-size: 13px; color: var(--slate); line-height: 1.6; }
.choice.on .choice-text { color: white; }

/* 내비 */
.nav-row {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}

.btn-nav-back {
  flex: 0 0 52px;
  height: 52px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s ease;
  display: flex; align-items: center; justify-content: center;
}
.btn-nav-back:hover { border-color: var(--ink); }

.btn-nav-next {
  flex: 1;
  height: 52px;
  background: var(--ink);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.3px;
}
.btn-nav-next:hover { background: #1e2a3e; transform: translateY(-1px); }
.btn-nav-next.gold { background: var(--rose); color: white; }

.warn-msg { font-size: 12px; color: var(--rose); margin-top: 8px; display: none; }

/* ══════════════════════════════════════
   결과
══════════════════════════════════════ */

/* 결과 히어로 */
.result-hero {
  text-align: center;
  padding: 40px 0 32px;
  animation: fadeUp 0.8s ease both;
}

.result-mbti-big {
  font-family: 'Noto Serif KR', serif;
  font-size: 64px;
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  margin: 16px 0 8px;
  background: linear-gradient(135deg, var(--ink) 0%, var(--slate) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.result-mbti-name {
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 16px;
  font-weight: 400;
}

.result-one-line {
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  color: var(--slate);
  line-height: 1.8;
  max-width: 480px;
  margin: 0 auto;
  padding: 16px 20px;
  background: white;
  border-radius: 14px;
  border: 1px solid var(--border);
}

/* 4축 바 */
.axis-section {
  margin-bottom: 20px;
  animation: fadeUp 0.8s 0.1s ease both;
}

.axis-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.axis-left  { width: 28px; font-size: 14px; font-weight: 700; color: var(--ink); text-align: right; }
.axis-right { width: 28px; font-size: 14px; font-weight: 700; color: var(--ink); }

.axis-track {
  flex: 1;
  height: 10px;
  background: #f0f0f0;
  border-radius: 100px;
  position: relative;
  overflow: hidden;
}

.axis-fill {
  position: absolute;
  top: 0; bottom: 0;
  border-radius: 100px;
  transition: all 1s cubic-bezier(0.4,0,0.2,1);
}

.axis-pct { font-size: 11px; color: var(--muted); width: 36px; text-align: right; }

/* 성향 분석 섹션 */
.analysis-section {
  animation: fadeUp 0.8s 0.15s ease both;
}

.section-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.trait-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.trait-item {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
}

.trait-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
.trait-val   { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.4; }

.analysis-text {
  font-size: 13px;
  color: var(--slate);
  line-height: 1.85;
  padding: 16px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;

}
.analysis-text b { color: var(--ink); }



/* 궁합 카드 */
.compat-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  animation: fadeUp 0.8s 0.2s ease both;
}

.compat-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  transition: all 0.25s ease;
}
.compat-card:hover { box-shadow: 0 4px 20px var(--shadow); transform: translateY(-2px); }

.compat-card.best { border-color: var(--gold); background: var(--gold-pale); }
.compat-card.good { border-color: rgba(244,167,195,0.4); background: #fff5fb; }
.compat-card.caution { border-color: rgba(107,47,160,0.3); background: #f8f0ff; }

.compat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.compat-mbti-badge {
  font-family: 'Noto Serif KR', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  min-width: 80px;
}

.compat-name { font-size: 12px; color: var(--muted); }

.compat-score-wrap {
  margin-left: auto;
  text-align: right;
}

.compat-score {
  font-size: 22px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
}

.compat-score-label { font-size: 10px; color: var(--muted); }

.compat-bar-track {
  height: 5px;
  background: rgba(0,0,0,0.06);
  border-radius: 100px;
  overflow: hidden;
  margin-bottom: 12px;
}

.compat-bar-fill {
  height: 100%;
  border-radius: 100px;
  width: 0%;
  transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
}

.compat-desc { font-size: 12px; color: var(--slate); line-height: 1.7; }
.compat-desc b { color: var(--ink); }

.compat-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.compat-tag {
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* 연애 취약점 */
.vuln-list { display: flex; flex-direction: column; gap: 8px; }
.vuln-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 12px 14px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 13px;
  color: var(--slate);
  line-height: 1.6;
}
.vuln-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

/* 태그 줄 */
.tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.tag-item {
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid;
}
.t-gold { color: var(--gold); border-color: rgba(201,151,58,0.4); background: var(--gold-pale); }
.t-rose { color: var(--rose); border-color: rgba(196,81,106,0.4); background: var(--rose-pale); }
.t-teal { color: var(--teal); border-color: rgba(42,124,116,0.4); background: var(--teal-pale); }
.t-navy { color: var(--navy); border-color: rgba(30,45,74,0.3); background: white; }
</style>

<body>
<div class="wrap">

<!-- ══ 인트로 ══ -->
<div id="p-intro" class="page on">
  <div class="intro-eyebrow"><span class="chip chip-gold">💌 MBTI × 연애 궁합 분석</span></div>
  <h1 class="intro-title">나의 연애 성향과<br/><em>잘 맞는 MBTI</em>는?</h1>
  <p class="intro-desc">MBTI 4개 축을 직접 측정하고,<br/>연애 스타일·취약점·궁합까지 한 번에 분석해요.<br/>총 32문항 · 약 5분 소요</p>

  <div class="intro-modules">
    <div class="module-card">
      <div class="module-icon">🧭</div>
      <div class="module-name">MBTI 정밀 측정</div>
      <div class="module-sub">4개 축을 수치로 측정해 정확한 타입 도출</div>
    </div>
    <div class="module-card">
      <div class="module-icon">💞</div>
      <div class="module-name">연애 궁합 순위</div>
      <div class="module-sub">베스트 · 좋음 · 주의 유형 분류</div>
    </div>
    <div class="module-card">
      <div class="module-icon">🔍</div>
      <div class="module-name">연애 성향 분석</div>
      <div class="module-sub">감정 표현·갈등 방식·애정 언어</div>
    </div>
    <div class="module-card">
      <div class="module-icon">⚠️</div>
      <div class="module-name">연애 취약점</div>
      <div class="module-sub">반복되는 연애 문제 패턴 진단</div>
    </div>
  </div>

  <div class="name-input-wrap">
    <label class="name-input-label">이름 또는 닉네임 (선택)</label>
    <input class="name-input" id="mbti-user-name" type="text" placeholder="예) 해리쉬, 햄진이" maxlength="10">
  </div>
  <button class="btn btn-primary" onclick="startTest()">시작하기 →</button>
</div>

<!-- ══ 검사 ══ -->
<div id="p-test" class="page">
  <div class="prog-area">
    <div class="prog-meta">
      <div class="prog-label">
        <div class="prog-label-dot" id="pdot"></div>
        <span id="psec">E / I 축</span>
      </div>
      <span class="prog-count" id="pcount">1 / 32</span>
    </div>
    <div class="prog-track"><div class="prog-bar" id="pbar" style="width:3%"></div></div>
  </div>

  <div id="qarea"></div>
  <p class="warn-msg" id="wmsg">답변을 선택해주세요</p>

  <div class="nav-row">
    <button class="btn-nav-back" id="backbtn" onclick="prev()" style="display:none">←</button>
    <button class="btn-nav-next" id="nextbtn" onclick="next()">다음 →</button>
  </div>
</div>

<!-- ══ 결과 ══ -->
<div id="p-result" class="page"></div>

</div>

<script>
// ══════════════════════════════════════════════════════════════
// 질문 데이터
// ══════════════════════════════════════════════════════════════
const QS = [
  // E/I (8문항)
  {id:1, ax:'EI', pole:'E', text:'새로운 사람을 만나거나 모임에 가면 에너지가 충전된다.', type:'scale'},
  {id:2, ax:'EI', pole:'I', text:'혼자 있는 시간이 없으면 지치는 느낌이 든다.', type:'scale'},
  {id:3, ax:'EI', pole:'E', text:'연애할 때 상대에게 먼저 연락하거나 계획을 주도하는 편이다.', type:'scale'},

const AX_COLOR = { EI:'#f4a7c3', SN:'#e8579a', TF:'#c2318a', JP:'#6b2fa0' };
const AX_LABEL = { EI:'외향 / 내향', SN:'감각 / 직관', TF:'감정 / 사고', JP:'계획 / 유연' };

let cur = 0;
let ans = {};

function startTest() {
  const nameEl = document.getElementById('mbti-user-name');
  const name = nameEl ? nameEl.value.trim() : '';
  if (name) localStorage.setItem('mbti_user_name', name);
  show('p-test');
  renderQ();
}

function show(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function renderQ() {
  const q = QS[cur];
  const total = QS.length;

  document.getElementById('pbar').style.width = ((cur+1)/total*100)+'%';
  document.getElementById('pcount').textContent = `${cur+1} / ${total}`;
  document.getElementById('psec').textContent = AX_LABEL[q.ax];
  document.getElementById('pdot').style.background = AX_COLOR[q.ax];

  document.getElementById('backbtn').style.display = cur===0?'none':'flex';
  const nb = document.getElementById('nextbtn');
  if (cur===total-1) { nb.textContent='결과 보기 ✨'; nb.classList.add('gold'); }
  else { nb.textContent='다음 →'; nb.classList.remove('gold'); }

  const sel = ans[q.id];
  const area = document.getElementById('qarea');
  area.innerHTML = `
    <div class="q-wrap">

      <p class="q-text">${q.text}</p>
      <div class="scale-group">
        ${[1,2,3,4,5].map(v=>`<button class="sc ${sel===v?'on':''}" onclick="pick(${q.id},${v})">${v}</button>`).join('')}
      </div>
      <div class="scale-labels"><span>전혀 아님</span><span>매우 그렇다</span></div>
    </div>`;

  document.getElementById('wmsg').style.display='none';
  area.style.animation='none'; area.offsetHeight; area.style.animation='fadeUp 0.35s ease both';
}

function pick(id, v) { ans[id]=v; renderQ(); }

function next() {
  if (!ans[QS[cur].id]) { document.getElementById('wmsg').style.display='block'; return; }
  if (cur===QS.length-1) calcResult();
  else { cur++; renderQ(); }
}
function prev() { if(cur>0){cur--;renderQ();} }

function calcResult() {
  // 각 축별 점수 계산
  const axes = ['EI','SN','TF','JP'];
  const scores = {};

  // 각 축의 두 극을 순서 고정 (문항 순서와 무관하게 항상 동일한 p0/p1 유지)
  const AXIS_POLES = { EI:['E','I'], SN:['S','N'], TF:['T','F'], JP:['J','P'] };

  axes.forEach(ax => {
    const qs = QS.filter(q=>q.ax===ax);
    const [p0, p1] = AXIS_POLES[ax];

    let s0=0, s1=0, cnt0=0, cnt1=0;
    qs.forEach(q => {
      const v = ans[q.id]||3;
      if(q.pole===p0) { s0+=v; cnt0++; }
      else { s1+=v; cnt1++; }
    });

    const avg0 = s0/cnt0;
    const avg1 = s1/cnt1;
    const total = avg0+avg1;
    const pct0 = Math.round(avg0/total*100);
    const pct1 = 100-pct0;

    scores[ax] = { p0, p1, pct0, pct1, dominant: pct0>=pct1 ? p0 : p1 };
  });

  const mbti = scores.EI.dominant + scores.SN.dominant + scores.TF.dominant + scores.JP.dominant;

  show('p-result');
  incrementCount('mbti_love_test');
  buildResult(mbti, scores);
}

function buildResult(mbti, scores) {
  const mdata = MBTI_DATA[mbti] || { name:'알 수 없음', keyword:mbti, love:'' };
  const compat = getCompat(mbti);
  const ls = getLoveStyle(mbti);
  const vulns = getVulnerabilities(mbti);

  // 4축 바 렌더용
  const axisRows = [
    { left:'E', right:'I', pctL: scores.EI.pct0, pctR: scores.EI.pct1, domL: scores.EI.dominant==='E', color:'#f4a7c3' },
    { left:'S', right:'N', pctL: scores.SN.pct0, pctR: scores.SN.pct1, domL: scores.SN.dominant==='S', color:'#e8579a' },
    { left:'T', right:'F', pctL: scores.TF.pct0, pctR: scores.TF.pct1, domL: scores.TF.dominant==='T', color:'#c2318a' },
    { left:'J', right:'P', pctL: scores.JP.pct0, pctR: scores.JP.pct1, domL: scores.JP.dominant==='J', color:'#6b2fa0' },
  ];

  // 궁합 목록 - 점수 높은 순 정렬
  const compatRaw = [
    ...compat.best.slice(0,3).map(m=>({mbti:m,tier:'best'})),
    ...compat.good.slice(0,3).map(m=>({mbti:m,tier:'good'})),
    ...(compat.caution||[]).slice(0,2).map(m=>({mbti:m,tier:'caution'})),
  ];
  // 점수 랜덤 미리 계산 후 내림차순 정렬
  const compatWithScore = compatRaw.map(item => ({...item, score: getCompatScore(item.tier).score}));
  const compatList = compatWithScore.sort((a,b) => b.score - a.score);

  const rs = document.getElementById('p-result');
  rs.innerHTML = `
    <!-- 히어로 -->
    <div class="result-hero">
      <div class="chip chip-gold">${localStorage.getItem('mbti_user_name') ? localStorage.getItem('mbti_user_name') + ' · 결과' : '✨ 결과'}</div>
      <div class="result-mbti-big">${mbti}</div>
      <div class="result-mbti-name serif">${mdata.name} · ${mdata.keyword}</div>
      <div class="result-one-line">${mdata.love}</div>
    </div>

    <div class="divider"></div>

    <!-- 4축 -->
    <div class="card analysis-section" style="margin-bottom:16px">
      <div class="section-title">🧭 MBTI 4축 측정값</div>
      ${axisRows.map((r,i)=>{
        const fillPct = r.domL ? r.pctL : r.pctR;
        const fillSide = r.domL ? 'left:0' : 'right:0';
        const showPct = r.domL ? r.pctL : r.pctR;
        const domLetter = r.domL ? r.left : r.right;
        return `
        <div class="axis-row" style="animation:slideIn 0.5s ${i*0.08}s ease both">
          <div class="axis-left" style="${r.domL?'color:'+r.color:''}">${r.left}</div>
          <div class="axis-track">
            <div class="axis-fill" style="background:${r.color};width:0%;${fillSide}" data-w="${fillPct}"></div>
          </div>
          <div class="axis-right" style="${!r.domL?'color:'+r.color:''}">${r.right}</div>
          <div class="axis-pct" style="color:${r.color}">${showPct}%</div>
        </div>`;
      }).join('')}
    </div>

    <!-- 연애 성향 분석 -->
    <div class="card analysis-section" style="margin-bottom:16px">
      <div class="section-title">💞 연애 성향 분석</div>
      <div class="trait-grid">
        <div class="trait-item">
          <div class="trait-label">감정 표현 방식</div>
          <div class="trait-val">${ls.express}</div>
        </div>
        <div class="trait-item">
          <div class="trait-label">갈등 처리 방식</div>
          <div class="trait-val">${ls.conflict}</div>
        </div>
        <div class="trait-item">
          <div class="trait-label">애정 언어</div>
          <div class="trait-val">${ls.love_lang}</div>
        </div>
        <div class="trait-item">
          <div class="trait-label">연애 약점 요약</div>
          <div class="trait-val">${ls.weak}</div>
        </div>
      </div>
    </div>

    <!-- 연애 취약점 -->
    <div class="card analysis-section" style="margin-bottom:16px">
      <div class="section-title">⚠️ 반복되는 연애 패턴 & 취약점</div>
      <div class="vuln-list">
        ${vulns.map(v=>`
          <div class="vuln-item">
            <span class="vuln-icon">${v.icon}</span>
            <span>${v.text}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- 궁합 -->
    <div style="margin-bottom:8px">
      <div class="section-title" style="margin-bottom:16px">💌 연애 궁합 순위</div>
      <div class="compat-grid">
        ${compatList.map(({mbti:tm, tier, score})=>{
          const td = MBTI_DATA[tm] || { name:tm, keyword:tm };
          const sc = { score, label: getCompatScore(tier).label, color: getCompatScore(tier).color };
          const tierLabel = {best:'💛 베스트 궁합', good:'💚 좋은 궁합', neutral:'🩶 보통 궁합', caution:'🔴 주의 궁합'}[tier];
          const barColor = {best:'#e8579a', good:'#f4a7c3', neutral:'var(--muted)', caution:'#6b2fa0'}[tier];
          const cardClass = {best:'best', good:'good', neutral:'', caution:'caution'}[tier];
          return `
          <div class="compat-card ${cardClass}">
            <div class="compat-header">
              <div>
                <div class="compat-mbti-badge">${tm}</div>
                <div class="compat-name">${td.name} · ${tierLabel}</div>
              </div>
              <div class="compat-score-wrap">
                <div class="compat-score" style="color:${barColor}">${sc.score}</div>
                <div class="compat-score-label">/ 100</div>
              </div>
            </div>
            <div class="compat-bar-track">
              <div class="compat-bar-fill" style="background:${barColor}" data-w="${sc.score}"></div>
            </div>
            <div class="compat-desc">${getCompatDesc(mbti, tm, tier)}</div>
            <div class="compat-tags">
              <span class="compat-tag" style="background:${barColor}20;color:${barColor};border:1px solid ${barColor}40">${sc.label}</span>
              <span class="compat-tag" style="background:var(--cream);color:var(--slate);border:1px solid var(--border)">${td.keyword}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="divider"></div>

    <button class="btn btn-outline" style="margin-top:8px" onclick="location.reload()">다시 검사하기</button>
  `;

  // 바 애니메이션
  setTimeout(()=>{
    document.querySelectorAll('.axis-fill').forEach(el=>{
      el.style.width = el.dataset.w+'%';
    });
    document.querySelectorAll('.compat-bar-fill').forEach(el=>{
      el.style.width = el.dataset.w+'%';
    });
  }, 400);
}

async function getCount(testName) {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/test_counts?test_name=eq.${testName}&select=count`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    const data = await res.json();
    return data.length > 0 ? data[0].count : 0;
  } catch(e) { return 0; }
}

async function incrementCount(testName) {
  // 먼저 존재하는지 확인
  const res = await fetch(`${SUPA_URL}/rest/v1/test_counts?test_name=eq.${testName}&select=count`, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  });
  const data = await res.json();

  if (data.length === 0) {
    // 없으면 insert
    await fetch(`${SUPA_URL}/rest/v1/test_counts`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ test_name: testName, count: 1 })
    });
  } else {
    // 있으면 +1
    await fetch(`${SUPA_URL}/rest/v1/test_counts?test_name=eq.${testName}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ count: data[0].count + 1 })
    });
  }
}

async function showCountBadge(testName, elementId) {
  const n = await getCount(testName);
  const el = document.getElementById(elementId);
  if (el) el.textContent = n.toLocaleString() + '명이 완료했어요';
}
